name: Daily Corpus Refresh (Phase 1 + Phase 2 + Phase 3)

on:
  schedule:
    - cron: '30 3 * * *'  # 09:00 AM IST (03:30 AM UTC)
  workflow_dispatch:

jobs:
  scrape-chunk-index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ========================================================================
      # Setup
      # ========================================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ========================================================================
      # Phase 1: Scraping (09:00-09:02 AM IST)
      # ========================================================================
      - name: Install Phase 1 dependencies
        run: |
          pip install -r phase-1-mvp/scraping/requirements.txt

      - name: Run Phase 1 Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🕐 Starting Phase 1 Scraper: $(date)"
          python -m phase_1_mvp.scraping.main \
            --mode=production \
            --retry-policy=aggressive
          echo "✓ Phase 1 Complete: $(date)"

      - name: Verify Phase 1 Output
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          from phase_1_mvp.scraping.database import DatabaseManager
          db = DatabaseManager()
          count = db.get_staging_count()
          print(f'✓ Scraped {count} HTML pages')
          "

      # ========================================================================
      # Phase 2: Chunking, Embedding & Indexing (09:02-09:05 AM IST)
      # ========================================================================
      - name: Install Phase 2 dependencies
        run: |
          pip install -r phase_2_production/requirements.txt

      - name: Run Phase 2 Chunking & Embedding
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          EMBEDDING_DEVICE: cpu
        run: |
          echo "🕐 Starting Phase 2 Pipeline: $(date)"
          python -m phase_2_production.main \
            --mode=production \
            --action=chunk-and-embed
          echo "✓ Phase 2 Pipeline Complete: $(date)"

      - name: Phase 2 Index Selection
        id: phase2_index
        env:
          USE_CHROMADB: ${{ secrets.USE_CHROMADB }}
          USE_PINECONE: ${{ secrets.USE_PINECONE }}
        run: |
          if [ "$USE_CHROMADB" = "true" ]; then
            echo "target=chromadb" >> $GITHUB_OUTPUT
            echo "✓ Phase 2 Index: Chroma Cloud (Phase 3)"
          else
            echo "target=pinecone" >> $GITHUB_OUTPUT
            echo "✓ Phase 2 Index: Pinecone (Phase 2)"
          fi

      # ========================================================================
      # Phase 2: Index Update (Pinecone)
      # ========================================================================
      - name: Index with Pinecone (Phase 2 - Legacy)
        if: steps.phase2_index.outputs.target == 'pinecone'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_ENV: ${{ secrets.PINECONE_ENV }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          echo "📌 Indexing with Pinecone..."
          python -m phase_2_production.main \
            --mode=production \
            --action=index \
            --vector-db=pinecone
          echo "✓ Pinecone indexing complete"

      # ========================================================================
      # Phase 3: Index Update (Chroma Cloud)
      # ========================================================================
      - name: Install Phase 3 dependencies
        if: steps.phase2_index.outputs.target == 'chromadb'
        run: |
          pip install -r phase_3_llm_integration/requirements.txt

      - name: Index with Chroma Cloud (Phase 3)
        if: steps.phase2_index.outputs.target == 'chromadb'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          echo "🌐 Indexing with Chroma Cloud..."
          python << 'EOF'
          from phase_3_llm_integration.chroma_cloud_client import create_chroma_client
          from phase_2_production.indexing.vectordb import get_chunks_from_db
          
          # Get chunks from Phase 2
          chunks = get_chunks_from_db()
          print(f"✓ Retrieved {len(chunks)} chunks from database")
          
          # Index with Chroma Cloud
          client = create_chroma_client()
          success = client.upsert_documents(chunks, batch_size=100)
          
          if success:
              stats = client.get_collection_stats()
              print(f"✓ Chroma Cloud indexing complete")
              print(f"  - Total documents: {stats['total_documents']}")
              print(f"  - Embedding model: {stats['embedding_model']}")
              print(f"  - Sparse model: {stats['sparse_model']}")
          else:
              exit(1)
          EOF

      # ========================================================================
      # Validation & Cache Cleanup
      # ========================================================================
      - name: Validate Indexes
        run: |
          echo "🔍 Validating indexes..."
          python << 'EOF'
          # Verify indexes have data
          import os
          target = os.getenv('INDEX_TARGET', 'pinecone')
          
          if target == 'pinecone':
              from phase_2_production.indexing.vectordb import PineconeVectorDB
              db = PineconeVectorDB()
              stats = db.get_stats()
              print(f"✓ Pinecone: {stats['total_vectors']} vectors")
          else:
              from phase_3_llm_integration.chroma_cloud_client import create_chroma_client
              client = create_chroma_client()
              stats = client.get_collection_stats()
              print(f"✓ Chroma Cloud: {stats['total_documents']} documents")
          EOF
        env:
          INDEX_TARGET: ${{ steps.phase2_index.outputs.target }}

      - name: Invalidate Redis Cache
        if: always()
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python << 'EOF'
          import redis
          import os
          
          redis_url = os.getenv('REDIS_URL')
          if redis_url:
              r = redis.from_url(redis_url)
              keys = r.keys('query:*')
              if keys:
                  r.delete(*keys)
              print(f"✓ Flushed {len(keys)} cache entries")
          EOF

      # ========================================================================
      # Notifications
      # ========================================================================
      - name: Send Slack Notification (Success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Daily Corpus Refresh Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Daily Corpus Refresh Completed*\n\n*Phase 1:* Scraped 15 Groww AMC URLs\n*Phase 2:* Chunked, embedded & indexed\n*Phase 3:* Hybrid search ready (Chroma Cloud)\n\n_Index Target:_ ${{ steps.phase2_index.outputs.target }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "`Workflow: ${{ github.workflow }}` | `Commit: ${{ github.sha }}` | `Time: $(date)`"
                    }
                  ]
                }
              ]
            }

      - name: Send Slack Notification (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Daily Corpus Refresh Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Daily Corpus Refresh Failed*\n\nPlease check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

  # ============================================================================
  # Phase 3: Optional - LLM Response Quality Test (Canary)
  # ============================================================================
  test-phase3-sample:
    runs-on: ubuntu-latest
    needs: scrape-chunk-index
    if: vars.ENABLE_PHASE3_TESTING == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Phase 3 dependencies
        run: |
          pip install -r phase_3_llm_integration/requirements.txt

      - name: Test Phase 3 with Sample Queries
        env:
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          echo "🧪 Running Phase 3 canary tests..."
          python << 'EOF'
          from phase_3_llm_integration import create_phase3_service
          import time
          
          service = create_phase3_service()
          
          # Sample test queries
          test_queries = [
              "What is the expense ratio of HDFC funds?",
              "Which mutual funds have the lowest exit load?",
              "What is the difference between large-cap and mid-cap funds?",
          ]
          
          results = []
          for query in test_queries:
              start = time.time()
              response = service.query(query)
              latency = time.time() - start
              
              results.append({
                  'query': query,
                  'latency_ms': latency * 1000,
                  'confidence': response['confidence'],
                  'sources': len(response.get('sources', [])),
              })
              
              print(f"✓ {query[:50]}...")
              print(f"  Latency: {latency*1000:.1f}ms | Confidence: {response['confidence']:.2%}")
          
          # Report
          avg_latency = sum(r['latency_ms'] for r in results) / len(results)
          print(f"\n📊 Average latency: {avg_latency:.1f}ms")
          
          if avg_latency > 1500:
              print("⚠️  Warning: Latency higher than expected")
          else:
              print("✓ Phase 3 performance OK")
          EOF

# ============================================================================
# Workflow Secrets Required
# ============================================================================
# DATABASE_URL              - PostgreSQL connection
# REDIS_URL                 - Redis connection
# PINECONE_API_KEY          - Pinecone API (Phase 2 legacy)
# PINECONE_ENV              - Pinecone environment
# CHROMA_HOST               - Chroma Cloud host (api.trychroma.com)
# CHROMA_API_KEY            - Chroma Cloud API key
# CHROMA_TENANT             - Chroma Cloud tenant ID
# CHROMA_DATABASE           - Chroma Cloud database name
# GROK_API_KEY              - xAI Grok API key
# SLACK_WEBHOOK_URL         - Slack notifications
# USE_CHROMADB              - "true" to enable Chroma Cloud (Phase 3)
# USE_PINECONE              - "true" to enable Pinecone (Phase 2)
# ENABLE_PHASE3_TESTING     - "true" to run LLM tests
