name: Daily Corpus Refresh (9 AM IST)

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * *'  # UTC time
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  scrape-and-index:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    env:
      PYTHON_VERSION: '3.10'
      LOG_LEVEL: 'INFO'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase_3_llm_integration/requirements.txt
          pip install beautifulsoup4 requests lxml
      
      - name: Fetch and ingest 15 Groww AMC URLs
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          LOG_LEVEL: INFO
        run: |
          echo "⏰ Starting daily corpus refresh (9 AM IST / 3:30 AM UTC)"
          python scripts/ingest_corpus.py
          echo "✅ Corpus ingestion completed"
      
      - name: Validate corpus indexing
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
        run: |
          python -c "
          import sys
          from phase_3_llm_integration.chroma_cloud_client import create_chroma_client
          client = create_chroma_client()
          stats = client.get_collection_stats()
          total = stats.get('total_documents', 0)
          print(f'✅ Corpus validation: {total} documents indexed')
          if total < 10:
              print('⚠️ WARNING: Corpus has fewer than 10 documents')
              sys.exit(1)
          "
      
      - name: Log completion
        run: |
          echo "✅ Daily corpus refresh completed successfully"
          echo "Scheduled: 9:00 AM IST (3:30 AM UTC daily)"
          echo "Source: 15 Groww AMC pages (official public data)"
          echo "Timestamp: $(date -u)"

      - name: Report failure (optional)
        if: failure()
        run: |
          echo "❌ Corpus refresh failed"
          echo "Time: $(date -u)"
          echo "Manual intervention may be needed"
            --local-vectordb
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EMBEDDING_DEVICE: 'cpu'
          EMBEDDING_MODEL: 'sentence-transformers/all-mpnet-base-v2'
          LOG_LEVEL: 'INFO'
      
      - name: Update vector DB and BM25 indexes
        run: |
          echo "Phase 2: Updating indexes..."
          # Vector DB and BM25 are updated during chunking/embedding process
          # This step confirms index health
          python -c "
          from phase_2_production.indexing.vectordb import LocalVectorIndex
          from phase_2_production.indexing.bm25 import BM25Indexer
          vec_db = LocalVectorIndex()
          bm25 = BM25Indexer()
          print('✓ Vector DB and BM25 indexes verified')
          "
      
      - name: Invalidate cache
        run: |
          echo "Phase 2: Invalidating Redis cache..."
          python -c "
          import redis
          import os
          redis_url = os.getenv('REDIS_URL', 'redis://localhost:6379')
          try:
              r = redis.from_url(redis_url)
              r.flushdb()
              print('✓ Redis cache invalidated')
          except Exception as e:
              print(f'⚠ Redis not available (expected in GitHub Actions): {e}')
          "
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        continue-on-error: true
      
      - name: Validate scrape
        run: |
          echo "Validating scrape results..."
          python -m phase_1_mvp.scraping.validator validate_daily_run
      
      - name: Send Slack notification (success)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Daily corpus refresh completed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Daily Corpus Refresh*\n*Status:* SUCCESS\n*Timestamp:* $(date -u)"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Send Slack notification (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Daily corpus refresh FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Daily Corpus Refresh*\n*Status:* FAILED\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
